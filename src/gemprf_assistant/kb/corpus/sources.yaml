# Curated GEM-pRF sources; local_path is relative to the corpus root.
- id: paper.abstract
  title: GEM-pRF paper abstract
  kind: paper
  url: https://doi.org/10.1016/j.media.2025.103891
  description: 'Paper metadata and abstract for GEM-pRF. It describes the core claim: a GLM reformulation,
    direct derivative computation, removal of iterative refinement bottlenecks, and much faster pRF estimation.'
- id: paper.full
  title: GEM-pRF full paper (Mittal et al., Medical Image Analysis 2026)
  kind: paper
  url: https://doi.org/10.1016/j.media.2025.103891
  local_path: external/paper/gemprf_paper.md
  description: Full text of the GEM-pRF paper including abstract, introduction (retinotopic mapping background
    and visual areas V1, V2, VP, V3, V4), methods (GLM reformulation, coarse fitting, quadratic refinement,
    sampling space, multi-GPU, data), validation against iterative refinement, comparison with mrVista,
    retinotopic maps, and performance analysis.
